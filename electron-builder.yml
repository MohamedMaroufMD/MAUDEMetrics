appId: com.marouf.maudemetrics
productName: MAUDEMetrics
directories:
  output: dist-electron
  buildResources: assets
files:
  - "main.js"
  - "package.json"
extraResources:
  - "backend/**/*"
mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  category: public.app-category.medical
  artifactName: "${productName}-${arch}.${ext}"
win:
  target: nsis
  artifactName: "${productName}-Setup.${ext}"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  releaseType: release
