appId: com.marouf.maudemetrics
productName: MAUDEMetrics
directories:
  output: dist-electron
  buildResources: assets
files:
  - "main.js"
  - "package.json"
extraResources:
  - "backend/**/*"
mac:
  target: dmg
  category: public.app-category.medical
win:
  target: nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
