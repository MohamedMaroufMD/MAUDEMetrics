name: Build and Release MAUDEMetrics

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
          - os: macos-15-intel    # x86_64 runner → Intel (x64) build
            arch: x64
          - os: macos-latest      # arm64 runner  → Apple Silicon build
            arch: arm64
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Disable Windows Defender Real-Time Protection (CI only)
        if: runner.os == 'Windows'
        shell: powershell
        run: Set-MpPreference -DisableRealtimeMonitoring $true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Python Backend
        run: python package-backend.py

      - name: Verify backend binary exists
        shell: bash
        run: ls -la backend/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm install

      - name: Align app version with git tag
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          npm version --no-git-tag-version "$TAG_VERSION"
          echo "Release tag: $GITHUB_REF_NAME"
          echo "package.json version: $(node -p "require('./package.json').version")"

      - name: Build and Publish Electron App (macOS)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --publish always --${{ matrix.arch }}

      - name: Build and Publish Electron App (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --publish always
